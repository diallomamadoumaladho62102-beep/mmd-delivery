[functions.stripe_webhook]
verify_jwt = false

[functions.restaurant-connect-link]
enabled = true
verify_jwt = true
import_map = "./functions/restaurant-connect-link/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/restaurant-connect-link/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/restaurant-connect-link/*.html" ]

[analytics]
enabled = false

[functions.stripe_driver_onboarding]
enabled = true
verify_jwt = true
import_map = "./functions/stripe_driver_onboarding/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/stripe_driver_onboarding/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/stripe_driver_onboarding/*.html" ]
