name: Production safety retention cron

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: production-safety-retention-cron
  cancel-in-progress: false

jobs:
  safety-retention-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      SITE_URL: ${{ vars.PRODUCTION_SITE_URL || 'https://www.mmddelivery.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate cron configuration
        run: |
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::Missing GitHub repository secret CRON_SECRET. Sync it from Vercel production (see scripts/sync-github-cron-secret.mjs)."
            exit 1
          fi
          echo "CRON_SECRET is configured (length ${#CRON_SECRET})."
          echo "SITE_URL=${SITE_URL}"

      - name: Run safety recording retention cron
        run: node scripts/run-production-safety-retention-cron.mjs
