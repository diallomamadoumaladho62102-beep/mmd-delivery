name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck web
        run: pnpm --dir apps/web exec tsc --noEmit

      - name: Typecheck mobile
        run: pnpm --dir apps/mobile exec tsc --noEmit

      - name: Verify migration files
        run: node scripts/verify-migration-files.mjs

      - name: Verify profiles signup role guard
        run: node scripts/verify-profiles-signup-role-guard.mjs

      - name: Cron HTTP evaluator unit test
        run: node scripts/evaluateCronHttpResult.test.mjs

      - name: Secret scan
        run: node scripts/secret-scan.mjs

      - name: Lint
        run: pnpm --dir apps/mobile lint && pnpm --dir apps/web lint

      - name: Web build
        run: pnpm --dir apps/web build

      - name: Web security tests
        run: pnpm --dir apps/web test:security

      - name: Web critical tests
        run: pnpm --dir apps/web test:ci

      - name: Mobile maps tests
        run: pnpm --dir apps/mobile test:maps

      - name: Mobile navigation tests
        run: pnpm --dir apps/mobile test:navigation

      - name: Web Mapbox places parse tests
        run: pnpm --dir apps/web test:maps-places-parse
