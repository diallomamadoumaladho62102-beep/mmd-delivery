name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify migration files
        run: node scripts/verify-migration-files.mjs

      - name: Lint
        run: pnpm --dir apps/mobile lint && pnpm --dir apps/web lint

      - name: Web build
        run: pnpm --dir apps/web build

      - name: Web critical tests
        run: pnpm --dir apps/web test:ci

      - name: Mobile navigation tests
        run: pnpm --dir apps/mobile test:navigation
